<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Prevención Playas 2026-2027</title>

<style>
body{
    margin:0;
    background:#fff;
    text-align:center;
}

img{
    width:100%;
    max-width:1200px;
    height:auto;
}
</style>
</head>

<body>

<img id="imagenDia" alt="Prevención Playas">

<script>

const hoy = new Date();

const clave =
String(hoy.getMonth() + 1).padStart(2,"0")
+ "-"
+ String(hoy.getDate()).padStart(2,"0");

const imagen = document.getElementById("imagenDia");

imagen.src = `${clave}.png.png`;

imagen.onerror = () => {

    const inicio = new Date("2026-10-01");

    const dias = Math.ceil(
        (inicio - hoy) / (1000 * 60 * 60 * 24)
    );

    document.body.innerHTML = `
        <div style="
            max-width:1000px;
            margin:auto;
            padding:20px;
            text-align:center;
            font-family:Arial,sans-serif;
        ">

            <img
                src="Portada.jpg"
                style="width:100%;max-width:1200px;height:auto;"
                alt="Portada">

            <h1>Prevención Playas 2026-2027</h1>

            <h2>Faltan ${dias} días</h2>

            <p>
                para el inicio de las publicaciones diarias.
            </p>

        </div>
    `;
};

</script>
</script>

</body>
</html>
