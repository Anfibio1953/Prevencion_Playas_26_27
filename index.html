<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Prevención Playas 2026-2027</title>

<style>

body{
    margin:0;
    background:#ffffff;
    text-align:center;
    font-family:Arial, sans-serif;
}

img{
    width:100%;
    max-width:1200px;
    height:auto;
}

.contenedor{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.contador{
    font-size:48px;
    font-weight:bold;
    color:#0066cc;
}

</style>
</head>

<body>

<div id="contenido"></div>

<script>

const hoy = new Date();

const mes =
String(hoy.getMonth() + 1).padStart(2,"0");

const dia =
String(hoy.getDate()).padStart(2,"0");

const clave = `${mes}-${dia}`;

const contenido =
document.getElementById("contenido");

const imagen = new Image();

imagen.onload = function() {

    contenido.innerHTML = "";
    contenido.appendChild(imagen);

};

imagen.onerror = function() {

    const inicio = new Date("2026-10-01");

    const dias = Math.ceil(
        (inicio - hoy) /
        (1000*60*60*24)
    );

    contenido.innerHTML = `
        <div class="contenedor">

            <img
                src="Portada.jpg"
                alt="Portada">

            <h1>
                Prevención Playas
                2026-2027
            </h1>

            <h2>
                Cuenta regresiva
            </h2>

            <div class="contador">
                ${dias} días
            </div>

        </div>
    `;
};

imagen.src = `${clave}.png`;

</script>

</body>
</html>
